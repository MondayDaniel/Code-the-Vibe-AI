<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Gallery</title>
    
    <!-- CSS -->
<style>

:root{
--bg:#f4f4f4;
--card-bg:#ffffff;
--text:#111;
--accent:#007bff;
}

body.dark{
--bg:#121212;
--card-bg:#1e1e1e;
--text:#f4f4f4;
--accent:#4dabf7;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* Toggle button */

.toggle{
position:fixed;
top:20px;
right:20px;
padding:10px 15px;
border:none;
background:var(--accent);
color:white;
cursor:pointer;
border-radius:6px;
}

/* Gallery */

.gallery{
display:flex;
gap:30px;
justify-content:center;
align-items:center;
height:100vh;
flex-wrap:wrap;
}

/* Card */

.card{
background:var(--card-bg);
width:250px;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transform:translateY(40px);
opacity:0;
animation:fadeIn 1s forwards;
transition:0.3s;
}

.card:nth-child(2){ animation-delay:0.2s;}
.card:nth-child(3){ animation-delay:0.4s;}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

/* Image */

.card img{
width:100%;
display:block;
}

/* Info */

.info{
padding:15px;
}

.price{
color:var(--accent);
font-weight:bold;
}

/* Overlay */

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:0.3s;
}

.card:hover .overlay{
opacity:1;
}

.btn{
background:white;
padding:10px 20px;
border:none;
cursor:pointer;
border-radius:6px;
}

/* Position relative */

.card-container{
position:relative;
}

/* Animation */

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>
<body>
    
<button class="toggle" onclick="toggleTheme()">Toggle Theme</button>
<!-- gallery -->
<div class="gallery">
<!-- card 1 -->
<div class="card">
<div class="card-container">
<img src="https://tse3.mm.bing.net/th/id/OIP.DJX720mp3b8KbLg9fM7iJQAAAA?rs=1&pid=ImgDetMain&o=7&rm=3">
<div class="overlay">
<button class="btn">Buy Now</button>
</div>
</div>
<div class="info">
<h3>Headphones</h3>
<p class="price">$59</p>
</div>
</div>

<!-- card 2 -->
<div class="card">
<div class="card-container">
<img src="https://tse2.mm.bing.net/th/id/OIP.Csmup8ZMVEzLThPdl0PuEAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
<div class="overlay">
<button class="btn">Buy Now</button>
</div>
</div>
<div class="info">
<h3>Sneakers</h3>
<p class="price">$89</p>
</div>
</div>

<!-- card 3 -->
<div class="card">
<div class="card-container">
<img src="https://static.vecteezy.com/system/resources/previews/050/177/034/non_2x/smart-watch-isolated-on-transparent-background-png.png">
<div class="overlay">
<button class="btn">Buy Now</button>
</div>
</div>
<div class="info">
<h3>Watch</h3>
<p class="price">$120</p>
</div>
</div>


</div>

    <!-- JS -->
<script>

function toggleTheme(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
